<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" fill="none">
  <!-- Ground shadow -->
  <ellipse cx="150" cy="305" rx="90" ry="10" fill="#d4a0a0" opacity="0.15"/>

  <!-- Box base -->
  <rect x="55" y="160" width="190" height="140" rx="6" fill="url(#boxGrad)" stroke="#d4a0a0" stroke-width="1.2"/>
  <!-- Box base texture -->
  <rect x="55" y="160" width="190" height="140" rx="6" fill="url(#boxTexture)" opacity="0.08"/>

  <!-- Vertical ribbon on box -->
  <rect x="138" y="160" width="24" height="140" fill="url(#vRibbon)" opacity="0.7"/>

  <!-- Box lid -->
  <rect x="45" y="130" width="210" height="35" rx="5" fill="url(#lidGrad)" stroke="#d4a0a0" stroke-width="1.2"/>
  <!-- Lid highlight -->
  <rect x="50" y="132" width="200" height="4" rx="2" fill="#ffffff" opacity="0.3"/>

  <!-- Horizontal ribbon on lid -->
  <rect x="45" y="142" width="210" height="14" fill="url(#hRibbon)" opacity="0.65"/>

  <!-- Ribbon bow -->
  <!-- Left loop -->
  <ellipse cx="125" cy="120" rx="22" ry="16" fill="#d6c9e8" stroke="#b8a0d0" stroke-width="0.8" opacity="0.8"/>
  <ellipse cx="125" cy="120" rx="14" ry="10" fill="#e0d4f0" opacity="0.4"/>
  <!-- Right loop -->
  <ellipse cx="175" cy="120" rx="22" ry="16" fill="#d6c9e8" stroke="#b8a0d0" stroke-width="0.8" opacity="0.8"/>
  <ellipse cx="175" cy="120" rx="14" ry="10" fill="#e0d4f0" opacity="0.4"/>
  <!-- Center knot -->
  <circle cx="150" cy="125" r="8" fill="#c4b0d8" stroke="#a890c0" stroke-width="0.8"/>
  <circle cx="150" cy="125" r="4" fill="#d6c9e8" opacity="0.5"/>

  <!-- Ribbon tails -->
  <path d="M140 133 C135 145 128 155 120 160" stroke="#c4b0d8" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M160 133 C165 145 172 155 180 160" stroke="#c4b0d8" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Decorative sketch lines (hand-drawn feel) -->
  <path d="M60 165 C62 163 64 165 66 163" stroke="#c47a8a" stroke-width="0.5" opacity="0.2"/>
  <path d="M230 290 C232 288 234 290 236 288" stroke="#c47a8a" stroke-width="0.5" opacity="0.2"/>

  <!-- Tiny hearts -->
  <path d="M80 185 C80 182 83 181 85 183 C87 181 90 182 90 185 C90 188 85 192 85 192 C85 192 80 188 80 185Z" fill="#f4c6c6" opacity="0.4"/>
  <path d="M210 260 C210 257 213 256 215 258 C217 256 220 257 220 260 C220 263 215 267 215 267 C215 267 210 263 210 260Z" fill="#d6c9e8" opacity="0.35"/>

  <!-- Sparkle dots -->
  <circle cx="70" cy="140" r="2" fill="#f4c6c6" opacity="0.4"/>
  <circle cx="235" cy="175" r="1.5" fill="#d6c9e8" opacity="0.4"/>
  <circle cx="85" cy="280" r="1.8" fill="#e8d8f0" opacity="0.35"/>
  <circle cx="220" cy="145" r="2" fill="#f4c6c6" opacity="0.35"/>

  <!-- Watercolor wash effect -->
  <circle cx="100" cy="220" r="20" fill="#f4c6c6" opacity="0.04"/>
  <circle cx="200" cy="250" r="25" fill="#d6c9e8" opacity="0.04"/>

  <!-- Small flower -->
  <g transform="translate(230,180)" opacity="0.45">
    <circle cx="0" cy="-3.5" r="2.2" fill="#fce8e8"/>
    <circle cx="3.3" cy="-1" r="2.2" fill="#fce8e8"/>
    <circle cx="2" cy="2.8" r="2.2" fill="#fce8e8"/>
    <circle cx="-2" cy="2.8" r="2.2" fill="#fce8e8"/>
    <circle cx="-3.3" cy="-1" r="2.2" fill="#fce8e8"/>
    <circle cx="0" cy="0" r="1.3" fill="#c47a8a" opacity="0.5"/>
  </g>

  <defs>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef0f0"/>
      <stop offset="50%" stop-color="#fce8e8"/>
      <stop offset="100%" stop-color="#f8e4ec"/>
    </linearGradient>
    <linearGradient id="lidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde6e6"/>
      <stop offset="100%" stop-color="#f9d4d8"/>
    </linearGradient>
    <linearGradient id="vRibbon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4b0d8"/>
      <stop offset="50%" stop-color="#d6c9e8"/>
      <stop offset="100%" stop-color="#c4b0d8"/>
    </linearGradient>
    <linearGradient id="hRibbon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d6c9e8"/>
      <stop offset="50%" stop-color="#e0d4f0"/>
      <stop offset="100%" stop-color="#d6c9e8"/>
    </linearGradient>
    <pattern id="boxTexture" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="0.5" fill="#c47a8a"/>
    </pattern>
  </defs>
</svg>
