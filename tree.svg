  <circle cx="90" cy="370" r="12" fill="#f4c6c6" opacity="0.35"/>
  <circle cx="105" cy="362" r="10" fill="#fce8e8" opacity="0.4"/>
  <circle cx="78" cy="378" r="8" fill="#d6c9e8" opacity="0.3"/>
  <circle cx="120" cy="368" r="9" fill="#f0d5d5" opacity="0.35"/>
