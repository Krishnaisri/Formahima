  <circle cx="310" cy="340" r="14" fill="#f4c6c6" opacity="0.3"/>
  <circle cx="295" cy="332" r="11" fill="#fce8e8" opacity="0.35"/>
  <circle cx="325" cy="345" r="9" fill="#d6c9e8" opacity="0.3"/>
  <circle cx="280" cy="338" r="8" fill="#f0d5d5" opacity="0.35"/>
  <circle cx="305" cy="328" r="5" fill="#f4c6c6" opacity="0.5"/>
