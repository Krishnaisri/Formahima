  <circle cx="245" cy="100" r="10" fill="#d6c9e8" opacity="0.3"/>
  <circle cx="200" cy="95" r="8" fill="#fce8e8" opacity="0.3"/>
  <circle cx="170" cy="108" r="6" fill="#f0d5d5" opacity="0.35"/>

