  <g transform="translate(310,335)" opacity="0.6">
    <circle cx="0" cy="-4" r="2.5" fill="#fce8e8"/>
    <circle cx="3.8" cy="-1.2" r="2.5" fill="#fce8e8"/>
    <circle cx="2.4" cy="3.2" r="2.5" fill="#fce8e8"/>
    <circle cx="-2.4" cy="3.2" r="2.5" fill="#fce8e8"/>
    <circle cx="-3.8" cy="-1.2" r="2.5" fill="#fce8e8"/>
    <circle cx="0" cy="0" r="1.5" fill="#c47a8a" opacity="0.6"/>
  </g>
  <g transform="translate(200,100)" opacity="0.5">
    <circle cx="0" cy="-3.5" r="2" fill="#d6c9e8"/>
    <circle cx="3.3" cy="-1" r="2" fill="#d6c9e8"/>
    <circle cx="2" cy="2.8" r="2" fill="#d6c9e8"/>
    <circle cx="-2" cy="2.8" r="2" fill="#d6c9e8"/>
    <circle cx="-3.3" cy="-1" r="2" fill="#d6c9e8"/>
