  <ellipse cx="340" cy="450" rx="3.5" ry="2.5" fill="#d6c9e8" opacity="0.25" transform="rotate(-15 340 450)"/>
  <ellipse cx="150" cy="480" rx="3" ry="2" fill="#f4c6c6" opacity="0.2" transform="rotate(40 150 480)"/>
  <ellipse cx="260" cy="500" rx="3.5" ry="2.5" fill="#fce8e8" opacity="0.2" transform="rotate(-30 260 500)"/>
  <ellipse cx="100" cy="460" rx="3" ry="2" fill="#e8d8f0" opacity="0.2" transform="rotate(15 100 460)"/>

  <!-- Small detail flowers (5-petal) -->
  <g transform="translate(92,360)" opacity="0.6">
