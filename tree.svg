  <circle cx="115" cy="188" r="9" fill="#d6c9e8" opacity="0.35"/>
  <circle cx="88" cy="202" r="8" fill="#fce8e8" opacity="0.3"/>
  <circle cx="105" cy="185" r="4" fill="#f4c6c6" opacity="0.5"/>

