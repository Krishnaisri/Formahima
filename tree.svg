  <circle cx="335" cy="262" r="8" fill="#fce8e8" opacity="0.3"/>
  <circle cx="290" cy="252" r="7" fill="#f0d5d5" opacity="0.3"/>
  <circle cx="315" cy="245" r="4" fill="#f4c6c6" opacity="0.5"/>

