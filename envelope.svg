<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Soft shadow -->
  <ellipse cx="200" cy="275" rx="140" ry="12" fill="#f4c6c6" opacity="0.2"/>

  <!-- Envelope body -->
  <rect x="60" y="90" width="280" height="180" rx="8" fill="url(#envGrad)" stroke="#d4a0a0" stroke-width="1.2" opacity="0.95"/>

  <!-- Paper texture lines -->
  <line x1="80" y1="140" x2="320" y2="140" stroke="#f0d5d5" stroke-width="0.5" opacity="0.4"/>
  <line x1="80" y1="170" x2="320" y2="170" stroke="#f0d5d5" stroke-width="0.5" opacity="0.3"/>
  <line x1="80" y1="200" x2="280" y2="200" stroke="#f0d5d5" stroke-width="0.5" opacity="0.3"/>

  <!-- Inner paper peeking -->
  <rect x="90" y="85" width="220" height="60" rx="4" fill="#fffcfa" stroke="#e8d0d0" stroke-width="0.8" opacity="0.7"/>
  <line x1="110" y1="100" x2="270" y2="100" stroke="#d6c9e8" stroke-width="0.6" opacity="0.4"/>
  <line x1="110" y1="112" x2="240" y2="112" stroke="#d6c9e8" stroke-width="0.6" opacity="0.3"/>

  <!-- Envelope flap (triangle) -->
  <path d="M60 90 L200 195 L340 90 Z" fill="url(#flapGrad)" stroke="#d4a0a0" stroke-width="1" opacity="0.9"/>

  <!-- Flap inner shadow -->
  <path d="M80 95 L200 180 L320 95" fill="none" stroke="#c49a9a" stroke-width="0.5" opacity="0.3"/>

  <!-- Ribbon horizontal -->
  <rect x="140" y="175" width="120" height="8" rx="3" fill="url(#ribbonGrad)" opacity="0.8"/>
  <!-- Ribbon bow left -->
  <ellipse cx="165" cy="172" rx="14" ry="10" fill="#d6c9e8" stroke="#b8a0d0" stroke-width="0.6" opacity="0.7"/>
  <!-- Ribbon bow right -->
  <ellipse cx="235" cy="172" rx="14" ry="10" fill="#d6c9e8" stroke="#b8a0d0" stroke-width="0.6" opacity="0.7"/>
  <!-- Ribbon knot -->
  <circle cx="200" cy="175" r="5" fill="#c4b0d8" stroke="#a890c0" stroke-width="0.5"/>

  <!-- Wax seal -->
  <circle cx="200" cy="220" r="20" fill="url(#sealGrad)" stroke="#a04040" stroke-width="0.8"/>
  <circle cx="200" cy="220" r="15" fill="none" stroke="#c06060" stroke-width="0.5" opacity="0.5"/>
  <!-- Seal heart -->
  <path d="M193 216 C193 212 197 210 200 213 C203 210 207 212 207 216 C207 220 200 225 200 225 C200 225 193 220 193 216Z" fill="#fce8e8" opacity="0.8"/>

  <!-- Decorative corner flourishes -->
  <path d="M70 100 C65 95 68 88 75 90" stroke="#d6c9e8" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M330 100 C335 95 332 88 325 90" stroke="#d6c9e8" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M70 260 C65 265 68 272 75 270" stroke="#f4c6c6" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M330 260 C335 265 332 272 325 270" stroke="#f4c6c6" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Tiny flower decorations -->
  <circle cx="85" cy="120" r="3" fill="#f4c6c6" opacity="0.4"/>
  <circle cx="315" cy="250" r="3" fill="#d6c9e8" opacity="0.4"/>
  <circle cx="90" cy="250" r="2.5" fill="#d6c9e8" opacity="0.3"/>
  <circle cx="310" cy="120" r="2.5" fill="#f4c6c6" opacity="0.3"/>

  <!-- Watercolor splatter effect -->
  <circle cx="100" cy="150" r="8" fill="#f4c6c6" opacity="0.06"/>
  <circle cx="300" cy="200" r="12" fill="#d6c9e8" opacity="0.06"/>
  <circle cx="150" cy="240" r="10" fill="#e8d8f0" opacity="0.05"/>

  <defs>
    <linearGradient id="envGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef0f0"/>
      <stop offset="50%" stop-color="#fce8e8"/>
      <stop offset="100%" stop-color="#f8e4ec"/>
    </linearGradient>
    <linearGradient id="flapGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde6e6"/>
      <stop offset="100%" stop-color="#f9d4d8"/>
    </linearGradient>
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d6c9e8"/>
      <stop offset="50%" stop-color="#e0d4f0"/>
      <stop offset="100%" stop-color="#d6c9e8"/>
    </linearGradient>
    <radialGradient id="sealGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#e87a7a"/>
      <stop offset="100%" stop-color="#c44a4a"/>
    </radialGradient>
  </defs>
</svg>
